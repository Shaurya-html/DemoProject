<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        var n = parseInt(prompt("Enter a number: "));

        for(i=1;i<=10;i++){
            document.write(i*n);
        }

    </script>
</body>
</html>
