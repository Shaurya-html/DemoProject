<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        function checkVotingAge(a){

            if (a < 18){
                document.writeln("Not eligible to vote.");
            }
            else{
                document.writeln("Eligible to vote.");
            }

        }

        var age = parseInt(prompt("Enter your age:"));
        checkVotingAge(age);


    </script>
</body>

</html>
