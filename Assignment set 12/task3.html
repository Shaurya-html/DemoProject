<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>

        var m = parseInt(prompt("Enter your marks: "));

        if(m>=90 && m<=100){
            document.writeln("Grade A");
        }
        else if(m>=75 && m<=89){
            document.writeln("Grade B");
        }
        else if(m>=60 && m<=74){
            document.writeln("Grade C");
        }
        else if(m>=40 && m<=59){
            document.writeln("Grade B");
        }
        else{
            document.write("Fail.");
        }

    </script>
</body>
</html>
