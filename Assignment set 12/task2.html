<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <Script>

        // Largest of three numbers

        var n1 = parseInt(prompt("Enter 1st number: "));
        var n2 = parseInt(prompt("Enter 2nd number: "));
        var n3 = parseInt(prompt("Enter 3rd number: "));

        if (n1 > n2) {
            if (n1 > n3) {
                document.writeln("1st number is largest.");
            }

        }
        else if (n2 > n1) {
            if (n2 > n3) {
                document.writeln("2nd number is largest.");
            }
        }
        else {
            document.writeln("3rd number is largest.")
        }

    </Script>

</body>

</html>
