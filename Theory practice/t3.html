<!DOCTYPE html>
<html lang="en">
<head>
    <style>

         .parent {
                display: flex;
                justify-content:space-evenly;
                margin-top: 100px;
            }

            .child {
                border: 3px solid black;
                width: 300px;
                height: 400px;
                border-radius: 20px;
            }

            .child h1,h4,p{
                text-align: center;
            }

            .child button{
                margin-left: 115px;
                border-radius:30px;
                background-color:rgb(124, 145, 239);
                border:0px;
            }

            .child img{
                border-radius: 15px;
            }

            #smartphone{
                border: 5px solid rgb(124, 145, 239);
            }

            .navbar{
                display:flex;
                justify-content: space-evenly;
                align-items:center;
                background-color:dimgrey;
                padding:20px;
                
            }

            .logo h1{
                text-align: left;
                color:white;
                font-family:Arial, Helvetica, sans-serif;
                padding-right: 700px;
            }

            .navlinks a{
                text-decoration:none;
                color:aliceblue;
                font-size: large;
                padding:20px;
                align-items:end;
                font-family:Arial, Helvetica, sans-serif;
                padding-top: 10px;
            }

            .title{
                text-align: center;
            }
            
        .hero{
            background-image: url(img.jpg);
            height: 500px;
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
            padding-top:15%;
            background-repeat:no-repeat;
            opacity: 1;
            background:linear-gradient(rgba(131, 117, 9, 0.5),rgba(123, 75, 237, 0.5)),url(img.jpg);
            margin-top: 20px;
        }
        
        .navbar{
                display:flex;
                justify-content: space-evenly;

            }
        
            .logo h1{

            }

            .navlinks a{
                text-decoration:none;
                color:aliceblue;
                font-size: large;
                padding:20px;
                align-items:end;
                font-family:Arial, Helvetica, sans-serif;
                padding-top: 10px;
            }

            .title{
                text-align: center;
            }

    </style>    
</head>
<body>
     <div class="navbar">

            </div>

            <div class="navlinks">

            </div>

            
        </div>

    <div class="hero">
        <h1>Welcome to our website</h1>
        <p>Discover amazing content and connect with us!</p>
    </div>

    <div class="parent">
            <div class="child" id="smartphone">
                <img src="img.jpg" height="200" width="300">
                <h1>Smartphone</h1>

            </div>

            <div class="child">
                <img src="img.jpg" height="200" width="300">
                <h1>Laptop</h1>

            <div class="child">
