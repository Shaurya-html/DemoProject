<!DOCTYPE html>
<html lang="en">
<head>
    <style>

        .boxgrp{
            display:flex;
            justify-content: space-around;
            
           
        }

        .box{
            border: 5px solid blue;
            height:500px;
            width: 500px;
            transition:transform 0.2s linear, background-color 0.2s linear, border 0.2s linear;
            background-color: blue;
            border-radius: 50%;
        }

        .box:hover{
            transform: scale(0.5);
            background-color: red;
            border: 5px solid red;
        }

    </style>
</head>
<body>
    
    <div class="boxgrp">

        <div class="box">

        </div>
        <div class="box">

        </div>

    </div>
    

</body>
</html>
