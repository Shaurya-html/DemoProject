<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Me</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>

  <style>
    .Mail_input {
      max-width: 500px;
      height:20px;
      padding: 12px 20px;
      margin: 0 auto;
      display: inline-block;
      border-radius: 4px;
      justify-content: space-evenly;
      display: flex;
      flex-direction: row;
      margin-top:50px;
    }

    body h1 {
      text-align: center;
      margin-top:200px;
    }

    body {
      background-image: linear-gradient(rgba(8, 8, 8, 0.5), rgba(0, 0, 0, 0.5)), url('sign.jpg');
      color: rgb(255, 255, 255);
      background-size: cover;
    }

    .display-5{
      font-weight:600;
      font-family:'Trebuchet MS';
    }

    .googa{
      height:50px;
      max-width:800px;
      border-radius: 20px;
    }

    button{
      width:100px;
    }
  </style>

</head>

<body>
  <nav class="navbar navbar-expand-lg bg-warning">
    <div class="container-fluid">
      <a class="navbar-brand" href="randomBS.html"><b>Cars, Cars, & Cars!</b></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
        aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarSupportedContent">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">

          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="aboutBS.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="contactme.html">Sign up for Updates!</a>
          </li>

        </ul>
        <form class="d-flex" role="search">
          <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
          <button class="btn btn-primary" type="submit">Search</button>
        </form>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-5">
    <div class="row">
      <div class="col">
        <h1 class="display-5">Get news and updates on your mail!</h1>
      </div>
    </div>



    <div class="Mail_input">
      <div class="row">
        <div class="col">
          <div class="input-group">
            <span class="input-group-text" id="visible-addon">📨</span>
            <input type="text" class="form-control googa" placeholder="Email address" aria-label="Username"
              aria-describedby="visible-addon">
            <input type="text" class="form-control d-none" placeholder="Hidden input" aria-label="Hidden input"
              aria-describedby="visible-addon">
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col">
          <button class="btn btn-success" type="submit">Submit</button>
        </div>
      </div>


    </div>
  </div>

</body>

</html>
