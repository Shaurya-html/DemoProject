<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" name="name" id="name" placeholder="Enter text"><br><br> <p class="charLength"></p>
    <button onclick="msg();">Click me</button><br><br>

    <script>

        var charLength = document.getElementById("name");
        var display = document.getElementsByClassName("charLength")[0];

        function msg() {
            display.innerHTML = "Character length: " + charLength.value.length;
        }

    </script>
</body>
</html>
