<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .form label{
            justify-content:center;
            align-items:center;
        }

    </style>
</head>

<body>

    <form onsubmit="validation()" class="form">

        <label>Name: </label><input type="text" name="name" id="name"><br><br>
        <label>E-mail: </label><input type="text" name="email" id="email"><br><br>
        <label>Password: </label><input type="password" name="password" id="password"><br><br>
        <label>Reenter password: </label><input type="password" name="password" id="reenter"><br><br>
        <input type="submit" value="submit">

    </form>

    <script>

        function validation() {

            var name = document.getElementById("name").value;
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;
            var reenter = document.getElementById("reenter").value;

            if (password != reenter) {
                alert("Passwords entered don't match.");
                return false;
            }

            if (name == "" || email == "" || password == "" || reenter == "") {

                alert("Please fill all fields.");
                return false;

            }
            else {

                alert("Submitted successfully.");

            }
        }

    </script>
</body>

</html>
