<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 class="demo">Hello</h1>
    <button onclick="msg();">Click me</button><br><br>

    <script>

        function msg(){

            var result = document.getElementsByClassName("demo");
            result[0].style.backgroundColor = "orange";

        }

    </script>
</body>
</html>
